<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors ligne — Hôtel Belle Étoile</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #1a4d7a;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.06);
            padding: 2rem 2.5rem;
            border-radius: 14px;
            backdrop-filter: blur(6px);
            max-width: 400px;
        }
        .star { font-size: 3rem; color: #d4a64a; }
        h1 { font-family: Georgia, serif; margin: 0.5rem 0; }
        button {
            margin-top: 1.5rem;
            padding: 0.7rem 1.5rem;
            border: 0;
            background: #d4a64a;
            color: #1a4d7a;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="star">★</div>
        <h1>Hôtel Belle Étoile</h1>
        <p>Vous semblez être hors ligne. Vérifiez votre connexion puis réessayez.</p>
        <button onclick="window.location.reload()">Réessayer</button>
    </div>
</body>
</html>
